<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen File Server Example</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Zen File Server</h1>

    <p>
        Upload a file using the form below.
    </p>

    <form
        action="/upload"
        method="POST"
        enctype="multipart/form-data">

        <input
            type="file"
            name="file"
            required>

        <button type="submit">
            Upload File
        </button>

    </form>

    <h2>Uploaded Files</h2>

    {{if .Files}}

    <ul class="files">

        {{range .Files}}

        <li>
            <a href="/uploads/{{.}}" target="_blank">
                {{.}}
            </a>
        </li>

        {{end}}

    </ul>

    {{else}}

    <p class="empty">
        No files have been uploaded yet.
    </p>

    {{end}}

</div>

</body>
</html>
